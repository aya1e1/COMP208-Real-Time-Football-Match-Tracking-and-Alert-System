name: CI

on:
  push:
    branches: [ main, develop ]
  pull request:
    branches: [ main ]

jobs:
  test:
    run-on: ubuntu-latest
    strategy:
    matrix:
      python-version: ["3.11, "3.12"]

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Catch pip dependencies
      uses: actions/cache@v4
      with:
        path: #/.cache/pip
        key: ${{ runner/os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-key: ${{ runner.os }}-pip-

  - name: Install dependecies
    run: |
      python -m pip install --upgrad pip
      pip install -r requirements.txt
      pip install pytest pytest-cov

  - name: Run unit tests with coverage
    run: |
      pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing

  - name: Upload coverage report
    if: matrix.python-version == '3.11'
    uses: actions/upload-artifact@v4
    with:
      name: coverage report
      path: .coverage

lint:
  run-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Instal flake8
      run: pip instal flake8
    - name: Lint with flake8
      run: |
        # Stop build on syntax errors or undefined names
        slake8 backend/ tests/ -- count --select=E9.F63,F7,F82 --show-source --statistics
        # Warning only - don't fail build
        flake8 backend/ tests/ --count --eexit zero -- max-line-length=120 --statistics
  
