name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test
        run: |
          python -m unittest tests/backend_test.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy over SSH using password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /srv/football-app
            git fetch origin
            git reset --hard origin/main

            if grep -q 'YOUR_DOMAIN\|YOUR_SERVER_IP' deployment/nginx.conf; then
              echo "deployment/nginx.conf still contains placeholder values."
              echo "Replace YOUR_DOMAIN and YOUR_SERVER_IP before deploying."
              exit 1
            fi

            source venv/bin/activate
            pip install -r requirements.txt
            test -x /srv/football-app/venv/bin/gunicorn
            sudo cp deployment/nginx.conf /etc/nginx/conf.d/football-app.conf
            sudo rm -f /etc/nginx/conf.d/default.conf
            if systemctl list-unit-files httpd.service >/dev/null 2>&1; then
              sudo systemctl disable --now httpd || true
            fi
            sudo nginx -t
            sudo systemctl reload nginx
            sudo systemctl restart football-app
            sudo systemctl status nginx --no-pager
            sudo systemctl status football-app --no-pager
