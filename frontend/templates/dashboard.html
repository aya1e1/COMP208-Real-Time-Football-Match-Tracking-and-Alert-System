{% extends "base.html" %}
{% block title %}Kickoff — Your Dashboard{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/fixture_cards.css') }}">
{% endblock %}

{% block content %}
<main class="page dashboard-page">
  <div id="dashboard-error-banner" class="page-error-banner" aria-live="polite"></div>
  <header class="dashboard-page-header">

    <h1 class="dashboard-title">You</h1>
  </header>

  <section class="dashboard-section">
    <h2 class="fixture-section-title">Favourite Teams</h2>
    <div id="dashboard-favourite-teams" class="dashboard-team-grid">
      <div class="dashboard-empty-card">
        Loading favourites
      </div>
    </div>
  </section>

  <section class="dashboard-section-grid">
    <section class="dashboard-section">
      <h2 class="fixture-section-title">Recent Fixtures</h2>
      <div id="dashboard-recent-fixtures" class="dashboard-fixture-stack">
        <div class="dashboard-empty-card">
          Loading recent fixtures
        </div>
      </div>
    </section>

    <section class="dashboard-section">
      <h2 class="fixture-section-title">Upcoming Fixtures</h2>
      <div id="dashboard-upcoming-fixtures" class="dashboard-fixture-stack">
        <div class="dashboard-empty-card">
          Loading upcoming fixtures
        </div>
      </div>
    </section>
  </section>
</main>

<script src="{{ url_for('static', filename='js/ui_errors.js') }}"></script>
<script src="{{ url_for('static', filename='js/fixture_cards.js') }}"></script>
<script src="{{ url_for('static', filename='js/recent_fixtures.js') }}"></script>
<script>
  const errorBannerEl = document.getElementById("dashboard-error-banner");
  const favouriteTeamsEl = document.getElementById("dashboard-favourite-teams");
  const recentFixturesEl = document.getElementById("dashboard-recent-fixtures");
  const upcomingFixturesEl = document.getElementById("dashboard-upcoming-fixtures");
  const {
    createPageErrorController,
    escapeHtml,
    renderTeamLogo,
    renderUpcomingFixtures
  } = window.KickoffFixtureCards;
  const pageError = createPageErrorController(errorBannerEl);

  function renderFavouriteTeams(teams) {
    if (!teams.length) {
      favouriteTeamsEl.innerHTML = `
        <div class="dashboard-empty-card">
          No favourite teams yet
        </div>
      `;
      return;
    }

    favouriteTeamsEl.innerHTML = teams.map((team) => `
      <a href="/teams/${Number(team.TeamID)}" class="card dashboard-team-card">
        <div class="card-body">
          <div class="dashboard-team-card-inner">
            ${renderTeamLogo(team.LogoURL, `${team.Name} logo`, "dashboard-team-logo")}
            <div class="dashboard-team-name">${escapeHtml(team.Name)}</div>
          </div>
        </div>
      </a>
    `).join("");
  }

  fetch("/api/me/dashboard")
    .then((response) => {
      if (!response.ok) {
        throw new Error("Unable to load dashboard.");
      }

      return response.json();
    })
    .then((payload) => {
      pageError.clear();
      const data = payload?.data || {};
      renderFavouriteTeams(Array.isArray(data.favourite_teams) ? data.favourite_teams : []);
      window.KickoffRecentFixtures.render(
        recentFixturesEl,
        Array.isArray(data.recent_fixtures) ? data.recent_fixtures : []
      );
      renderUpcomingFixtures(
        upcomingFixturesEl,
        Array.isArray(data.upcoming_fixtures) ? data.upcoming_fixtures : []
      );
    })
    .catch(() => {
      pageError.render("Unable to load dashboard.");
      favouriteTeamsEl.innerHTML = '<div class="dashboard-empty-card">Dashboard data unavailable.</div>';
      recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
      upcomingFixturesEl.innerHTML = '<div class="dashboard-empty-card">Upcoming fixtures unavailable.</div>';
    });
</script>
{% endblock %}
