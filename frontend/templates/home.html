{% extends "base.html" %}
{% block title %}Kickoff — Matches{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ static_asset('css/fixture_cards.css') }}">
<link rel="stylesheet" href="{{ static_asset('css/team_league_pages.css') }}">
{% endblock %}

{% block content %}
<main class="page dashboard-page home-page">
  <div id="home-error-banner" class="page-error-banner" aria-live="polite"></div>

  <header class="dashboard-page-header">

    <h1 class="dashboard-title">Home</h1>
  </header>

  <section class="league-layout">
    <div class="league-column">
      <section class="league-fixture-section page-recent-fixture-section">
        <h2 class="fixture-section-title">Recent Fixtures</h2>
        <div id="home-fixtures" class="dashboard-fixture-stack">
          <div class="dashboard-empty-card">Loading matches...</div>
        </div>
        <nav id="home-pagination" class="fixture-h2h-nav page-recent-fixture-pagination" aria-label="Match pages">
          <div class="fixture-empty">Loading pages...</div>
        </nav>
      </section>
    </div>

    <aside class="league-column">
      <section class="league-section league-standings-section">
        <h2 id="home-league-card-header" class="fixture-section-title">Premier League Table</h2>
        <div id="home-league-error-banner" class="page-error-banner" aria-live="polite"></div>
        <div id="home-league-standings">
          <div class="league-standings-wrap is-empty">
            <div class="league-standings-empty">Loading standings...</div>
          </div>
        </div>
      </section>
    </aside>
  </section>


</main>

<script src="{{ static_asset('js/ui_errors.js') }}"></script>
<script src="{{ static_asset('js/fixture_cards.js') }}"></script>
<script src="{{ static_asset('js/overview_tables.js') }}"></script>
<script src="{{ static_asset('js/recent_fixtures.js') }}"></script>
<script src="{{ static_asset('js/page_switcher.js') }}"></script>
<script>
(function() {
  var premierLeagueId = 39;
  var premierLeagueSeason = 2024;
  var fixturesPerPage = 6;
  var initialPage = Number(new URLSearchParams(window.location.search).get('page'));
  var currentPage = Number.isFinite(initialPage) && initialPage > 0 ? initialPage : 1;
  var homeErrorEl = document.getElementById('home-error-banner');
  var paginationEl = document.getElementById('home-pagination');
  var recentFixturesEl = document.getElementById('home-fixtures');
  var standingsEl = document.getElementById('home-league-standings');
  var standingsErrorEl = document.getElementById('home-league-error-banner');
  var standingsHeaderEl = document.getElementById('home-league-card-header');
  var homePageError = window.KickoffFixtureCards.createPageErrorController(homeErrorEl);
  var pageError = window.KickoffFixtureCards.createPageErrorController(standingsErrorEl);
  var escapeHtml = window.KickoffFixtureCards.escapeHtml;
  var renderTeamLogo = window.KickoffFixtureCards.renderTeamLogo;

  function renderStandingsMessage(message) {
    return '<div class="league-standings-wrap is-empty"><div class="league-standings-empty">' +
      escapeHtml(message) +
      '</div></div>';
  }

  function renderStandingsTeamCell(row) {
    var teamLabel = row.TeamAbbreviation || row.TeamName || 'Team';

    return '<a class="league-standings-team-link" href="/teams/' + escapeHtml(row.TeamID) + '">' +
      renderTeamLogo(
        row.TeamLogoURL,
        (row.TeamName || 'Team') + ' logo',
        'league-standings-team-logo',
        { width: 22, height: 22 }
      ) +
      '<span class="league-standings-team-text">' +
        '<span class="league-standings-team-name">' + escapeHtml(teamLabel) + '</span>' +
      '</span>' +
    '</a>';
  }

  function buildPageHref(pageNumber) {
    var url = new URL(window.location.href);
    if (pageNumber <= 1) {
      url.searchParams.delete('page');
    } else {
      url.searchParams.set('page', String(pageNumber));
    }

    return url.pathname + url.search;
  }

  function renderPagination(pagination) {
    window.KickoffPageSwitcher.render(paginationEl, pagination, {
      showDisabledNext: true,
      buildHref: buildPageHref,
      onSelect: function(nextPage) {
        currentPage = nextPage;
        window.history.replaceState({}, '', buildPageHref(nextPage));
        return loadFixtures({ preserveScroll: true });
      }
    });
  }

  function renderStandings(standings, seasonYear) {
    if (!standings.length) {
      standingsEl.innerHTML = renderStandingsMessage('No standings available for this season.');
      return;
    }

    standingsEl.innerHTML = window.KickoffOverviewTables.renderTable({
      className: 'league-standings-table compact',
      wrapClassName: 'league-standings-wrap',
      headers: [
        { content: 'Pos' },
        { content: 'Team' },
        { content: 'MP' },
        { content: 'GD' },
        { content: 'Pts' }
      ],
      rows: standings.map(function(row) {
        return [
          { className: 'team-value', content: row.Position },
          {
            content: renderStandingsTeamCell(row),
            raw: true
          },
          { className: 'team-value', content: row.Played },
          { className: 'team-value', content: row.GD },
          { className: 'team-value', content: row.Points }
        ];
      })
    });

    if (standingsHeaderEl && seasonYear) {
      standingsHeaderEl.innerHTML = '<a href="/leagues/' + premierLeagueId + '?season=' + seasonYear + '">Premier League Table</a>';
    }
  }

  function loadStandings() {
    return fetch('/api/leagues/' + premierLeagueId + '/seasons/' + premierLeagueSeason)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Unable to load league standings.');
        }
        return response.json();
      })
      .then(function(standingsPayload) {
        pageError.clear();
        renderStandings(
          Array.isArray(standingsPayload && standingsPayload.standings) ? standingsPayload.standings : [],
          premierLeagueSeason
        );
      });
  }

  loadStandings().catch(function(error) {
    var message = window.KickoffUIErrors.resolveMessage(error, 'Unable to load league standings.');
    standingsEl.innerHTML = renderStandingsMessage('Standings unavailable.');
    pageError.render(message);
  });

  function loadFixtures(options) {
    var preserveScroll = Boolean(options && options.preserveScroll);
    var scrollPosition = preserveScroll ? window.scrollY : null;
    recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Loading matches...</div>';

    return fetch('/api/fixtures?page=' + currentPage + '&per_page=' + fixturesPerPage)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Unable to load matches.');
        }

        return response.json();
      })
      .then(function(payload) {
        homePageError.clear();
        renderPagination(payload && payload.pagination);
        window.KickoffRecentFixtures.render(
          recentFixturesEl,
          Array.isArray(payload && payload.fixtures) ? payload.fixtures : [],
          {
            fallbackLeagueName: 'Match'
          }
        );

        if (preserveScroll && scrollPosition !== null) {
          window.requestAnimationFrame(function() {
            window.scrollTo({ top: scrollPosition, behavior: 'auto' });
          });
        }
      })
      .catch(function(error) {
        homePageError.render(window.KickoffUIErrors.resolveMessage(error, 'Unable to load matches.'));
        paginationEl.hidden = true;
        paginationEl.innerHTML = '';
        recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Matches unavailable.</div>';

        if (preserveScroll && scrollPosition !== null) {
          window.requestAnimationFrame(function() {
            window.scrollTo({ top: scrollPosition, behavior: 'auto' });
          });
        }
      });
  }

  loadFixtures();
})();
</script>
{% endblock %}
