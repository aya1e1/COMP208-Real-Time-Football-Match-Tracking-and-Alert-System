{% extends "base.html" %}
{% block title %}Kickoff — League Standings{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ static_asset('css/fixture_cards.css') }}">
<link rel="stylesheet" href="{{ static_asset('css/team_league_pages.css') }}">
{% endblock %}

{% block content %}
<main class="page league-page" data-league-id="{{ league_id }}">
  <div class="match-back">
    <a href="/">&larr; Back to home</a>
  </div>
  <div id="league-error-banner" class="page-error-banner" aria-live="polite"></div>

  <div class="league-view-page">
    <nav id="league-season-switcher" class="fixture-h2h-nav league-season-switcher" aria-label="League seasons">
      <div class="fixture-empty">Loading seasons...</div>
    </nav>

    <header class="league-page-header" id="league-header">
      <h1 class="league-headline">Loading league...</h1>
    </header>

    <section class="league-layout">
      <div class="league-column">
        <section class="league-section league-standings-section">
          <h2 class="fixture-section-title">League Table</h2>
          <div id="league-standings">
            <div class="league-standings-wrap is-empty">
              <div class="league-standings-empty">Loading standings...</div>
            </div>
          </div>
        </section>
      </div>

      <aside class="league-column">
        <section class="league-fixture-section page-recent-fixture-section">
          <h2 class="fixture-section-title">Recent Fixtures</h2>
          <div id="league-recent-fixtures" class="dashboard-fixture-stack">
            <div class="dashboard-empty-card">Loading recent fixtures...</div>
          </div>
          <nav id="league-recent-pagination" class="fixture-h2h-nav page-recent-fixture-pagination" aria-label="Recent fixture pages" hidden></nav>
        </section>
      </aside>
    </section>
  </div>
</main>

<script src="{{ static_asset('js/ui_errors.js') }}"></script>
<script src="{{ static_asset('js/fixture_cards.js') }}"></script>
<script src="{{ static_asset('js/recent_fixtures.js') }}"></script>
<script src="{{ static_asset('js/page_switcher.js') }}"></script>
<script src="{{ static_asset('js/overview_tables.js') }}"></script>
<script>
  const page = document.querySelector(".league-page");
  const leagueId = Number(page?.dataset.leagueId);
  const errorBannerEl = document.getElementById("league-error-banner");
  const headerEl = document.getElementById("league-header");
  const seasonSwitcherEl = document.getElementById("league-season-switcher");
  const standingsEl = document.getElementById("league-standings");
  const recentFixturesEl = document.getElementById("league-recent-fixtures");
  const recentPaginationEl = document.getElementById("league-recent-pagination");
  const {
    createPageErrorController,
    escapeHtml,
    renderTeamLogo
  } = window.KickoffFixtureCards;
  const pageError = createPageErrorController(errorBannerEl);
  const recentFixturesPerPage = 5;

  let leagueSeasons = [];
  let selectedSeasonYear = null;
  let currentRecentPage = Number(new URLSearchParams(window.location.search).get("recent_page")) || 1;
  let leagueName = "League";
  let leagueCountry = "";
  let leagueLogoUrl = "";
  let selectedSeasonMeta = null;

  function formatSeasonDate(value) {
    if (!value) {
      return "TBC";
    }

    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
      return String(value);
    }

    return date.toLocaleDateString("en-GB", {
      day: "numeric",
      month: "short",
      year: "numeric"
    });
  }

  function renderStandingsMessage(message) {
    return `
      <div class="league-standings-wrap is-empty">
        <div class="league-standings-empty">${escapeHtml(message)}</div>
      </div>
    `;
  }

  function renderStandingsTeamCell(row) {
    const teamName = row.TeamName || "Team";
    const description = row.Description || "";

    return `
      <a class="league-standings-team-link" href="/teams/${escapeHtml(row.TeamID)}">
        ${renderTeamLogo(
          row.TeamLogoURL,
          `${teamName} logo`,
          "league-standings-team-logo",
          { width: 22, height: 22 }
        )}
        <span class="league-standings-team-text">
          <span class="league-standings-team-name">${escapeHtml(teamName)}</span>
          ${description ? `<span class="league-standings-team-meta">${escapeHtml(description)}</span>` : ""}
        </span>
      </a>
    `;
  }

  function renderHeader() {
    const dateLabel = selectedSeasonMeta
      ? `${formatSeasonDate(selectedSeasonMeta.StartDate)} - ${formatSeasonDate(selectedSeasonMeta.EndDate)}`
      : "";
    const logoMarkup = leagueLogoUrl
      ? renderTeamLogo(leagueLogoUrl, `${leagueName} logo`, "league-header-logo", { width: 64, height: 64 })
      : '<div class="league-header-logo-placeholder" aria-hidden="true"></div>';

    headerEl.innerHTML = `
      <div class="league-header-shell">
        ${logoMarkup}
        <div class="league-header-copy">
          <h1 class="league-headline">${escapeHtml(leagueName)}</h1>
          ${leagueCountry ? `<div class="league-country">${escapeHtml(leagueCountry)}</div>` : ""}
          ${dateLabel ? `<div class="league-season-dates">${escapeHtml(dateLabel)}</div>` : ""}
        </div>
      </div>
    `;
  }

  function renderSeasonSwitcher() {
    if (!leagueSeasons.length) {
      seasonSwitcherEl.innerHTML = `<div class="fixture-empty">No seasons available.</div>`;
      return;
    }

    seasonSwitcherEl.innerHTML = `
      <div class="fixture-h2h-group left">
        ${leagueSeasons.map((season) => {
          const year = Number(season.Year);
          if (year === Number(selectedSeasonYear)) {
            return `
              <span class="fixture-h2h-link active" aria-current="page">
                ${escapeHtml(year)}
              </span>
            `;
          }

          return `
            <a class="fixture-h2h-link" href="${buildPageHref({ season: year, recentPage: 1 })}" data-season-year="${year}">
              ${escapeHtml(year)}
            </a>
          `;
        }).join("")}
      </div>
    `;

    seasonSwitcherEl.querySelectorAll("[data-season-year]").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        const year = Number(link.dataset.seasonYear);
        if (!Number.isFinite(year) || year === Number(selectedSeasonYear)) {
          return;
        }

        selectSeason(year);
      });
    });
  }

  function buildPageHref({ season = selectedSeasonYear, recentPage = currentRecentPage } = {}) {
    const url = new URL(window.location.href);

    if (Number.isFinite(Number(season))) {
      url.searchParams.set("season", String(season));
    } else {
      url.searchParams.delete("season");
    }

    if (Number(recentPage) > 1) {
      url.searchParams.set("recent_page", String(recentPage));
    } else {
      url.searchParams.delete("recent_page");
    }

    return `${url.pathname}${url.search}`;
  }

  function updateUrlState({ season = selectedSeasonYear, recentPage = currentRecentPage } = {}) {
    window.history.replaceState({}, "", buildPageHref({ season, recentPage }));
  }

  function buildRecentFixturesApiHref(year, pageNumber = currentRecentPage) {
    const query = new URLSearchParams({
      page: String(pageNumber),
      per_page: String(recentFixturesPerPage)
    });

    return `/api/leagues/${leagueId}/seasons/${year}/recent-fixtures?${query.toString()}`;
  }

  function setRecentFixturesLoading(message = "Loading recent fixtures...") {
    recentPaginationEl.hidden = true;
    recentPaginationEl.innerHTML = "";
    recentFixturesEl.innerHTML = `<div class="dashboard-empty-card">${escapeHtml(message)}</div>`;
  }

  function renderRecentFixtures(fixtures, pagination) {
    const resolvedPagination = pagination || {
      page: 1,
      total_pages: 1,
      has_previous: false,
      has_next: false
    };

    currentRecentPage = Number(resolvedPagination.page) || 1;
    updateUrlState();
    window.KickoffRecentFixtures.render(
      recentFixturesEl,
      Array.isArray(fixtures) ? fixtures : [],
      { fallbackLeagueName: leagueName }
    );
    window.KickoffPageSwitcher.render(recentPaginationEl, resolvedPagination, {
      showDisabledNext: true,
      buildHref: (pageNumber) => buildPageHref({ recentPage: pageNumber }),
      onSelect: (nextPage) => {
        if (nextPage === currentRecentPage) {
          return;
        }

        return loadRecentFixturesPage(selectedSeasonYear, nextPage);
      }
    });
  }

  function renderStandings(standings) {
    if (!standings.length) {
      standingsEl.innerHTML = renderStandingsMessage("No standings available for this season.");
      return;
    }

    standingsEl.innerHTML = window.KickoffOverviewTables.renderTable({
      className: "league-standings-table detailed",
      wrapClassName: "league-standings-wrap",
      headers: [
        { content: "Pos" },
        { content: "Team" },
        { content: "MP" },
        { content: "W" },
        { content: "D" },
        { content: "L" },
        { content: "GF" },
        { content: "GA" },
        { content: "GD" },
        { content: "Pts" }
      ],
      rows: standings.map((row) => ([
        { className: "team-value", content: row.Position },
        {
          content: renderStandingsTeamCell(row),
          raw: true
        },
        { className: "team-value", content: row.Played },
        { className: "team-value", content: row.Won },
        { className: "team-value", content: row.Drawn },
        { className: "team-value", content: row.Lost },
        { className: "team-value", content: row.GF },
        { className: "team-value", content: row.GA },
        { className: "team-value", content: row.GD },
        { className: "team-value", content: row.Points }
      ]))
    });
  }

  async function loadRecentFixturesPage(year, pageNumber) {
    const previousRecentPage = currentRecentPage;
    const previousPaginationHtml = recentPaginationEl.innerHTML;
    const previousPaginationHidden = recentPaginationEl.hidden;
    const previousRecentFixturesHtml = recentFixturesEl.innerHTML;

    currentRecentPage = pageNumber;
    updateUrlState();
    setRecentFixturesLoading();

    try {
      const fixturesResponse = await fetch(buildRecentFixturesApiHref(year, pageNumber));
      if (!fixturesResponse.ok) {
        throw new Error("Unable to load recent fixtures.");
      }

      const fixturesPayload = await fixturesResponse.json();
      leagueName = fixturesPayload?.league?.Name || leagueName;
      leagueCountry = fixturesPayload?.league?.Country || leagueCountry;
      leagueLogoUrl = fixturesPayload?.league?.LogoURL || leagueLogoUrl;
      pageError.clear();
      renderHeader();
      renderRecentFixtures(
        Array.isArray(fixturesPayload?.recent_fixtures) ? fixturesPayload.recent_fixtures : [],
        fixturesPayload?.pagination || null
      );
    } catch (error) {
      currentRecentPage = previousRecentPage;
      updateUrlState();
      recentPaginationEl.hidden = previousPaginationHidden;
      recentPaginationEl.innerHTML = previousPaginationHtml;
      recentFixturesEl.innerHTML = previousRecentFixturesHtml || '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
      pageError.render(window.KickoffUIErrors.resolveMessage(error, "Unable to load recent fixtures."));
    }
  }

  async function loadSeasonData(year) {
    const [standingsResponse, fixturesResponse] = await Promise.all([
      fetch(`/api/leagues/${leagueId}/seasons/${year}`),
      fetch(buildRecentFixturesApiHref(year, currentRecentPage))
    ]);

    if (!standingsResponse.ok) {
      throw new Error("Unable to load league standings.");
    }

    if (!fixturesResponse.ok) {
      throw new Error("Unable to load recent fixtures.");
    }

    const standingsPayload = await standingsResponse.json();
    const fixturesPayload = await fixturesResponse.json();

    leagueName = standingsPayload?.league?.Name || fixturesPayload?.league?.Name || leagueName;
    leagueCountry = standingsPayload?.league?.Country || fixturesPayload?.league?.Country || leagueCountry;
    leagueLogoUrl = standingsPayload?.league?.LogoURL || fixturesPayload?.league?.LogoURL || leagueLogoUrl;
    const standings = Array.isArray(standingsPayload?.standings) ? standingsPayload.standings : [];
    pageError.clear();
    renderHeader();
    renderStandings(standings);
    renderRecentFixtures(
      Array.isArray(fixturesPayload?.recent_fixtures) ? fixturesPayload.recent_fixtures : [],
      fixturesPayload?.pagination || null
    );
  }

  async function selectSeason(year) {
    const previousSelectedSeasonYear = selectedSeasonYear;
    const previousRecentPage = currentRecentPage;
    const previousStandingsHtml = standingsEl.innerHTML;
    const previousRecentPaginationHtml = recentPaginationEl.innerHTML;
    const previousRecentPaginationHidden = recentPaginationEl.hidden;
    const previousRecentFixturesHtml = recentFixturesEl.innerHTML;
    selectedSeasonYear = year;
    currentRecentPage = 1;
    selectedSeasonMeta = leagueSeasons.find((season) => Number(season.Year) === Number(year)) || null;
    renderHeader();
    renderSeasonSwitcher();
    standingsEl.innerHTML = renderStandingsMessage("Loading standings...");
    setRecentFixturesLoading();
    updateUrlState({ season: year, recentPage: 1 });

    try {
      await loadSeasonData(year);
    } catch (error) {
      const message = window.KickoffUIErrors.resolveMessage(error, "Unable to load league details.");
      selectedSeasonYear = previousSelectedSeasonYear;
      currentRecentPage = previousRecentPage;
      selectedSeasonMeta = leagueSeasons.find((season) => Number(season.Year) === Number(previousSelectedSeasonYear)) || null;
      updateUrlState({ season: previousSelectedSeasonYear, recentPage: previousRecentPage });
      renderSeasonSwitcher();
      standingsEl.innerHTML = previousStandingsHtml || renderStandingsMessage("Standings unavailable.");
      recentPaginationEl.hidden = previousRecentPaginationHidden;
      recentPaginationEl.innerHTML = previousRecentPaginationHtml;
      recentFixturesEl.innerHTML = previousRecentFixturesHtml || '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
      renderHeader();
      pageError.render(message);
    }
  }

  async function initialiseLeaguePage() {
    if (!Number.isFinite(leagueId)) {
      pageError.render("Unable to load league details.");
      renderHeader();
      seasonSwitcherEl.innerHTML = '<div class="fixture-empty">Season data unavailable.</div>';
      standingsEl.innerHTML = renderStandingsMessage("Standings unavailable.");
      recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
      return;
    }

    const seasonsResponse = await fetch(`/api/leagues/${leagueId}/seasons`);
    if (!seasonsResponse.ok) {
      throw new Error(seasonsResponse.status === 404 ? "League not found." : "Unable to load league details.");
    }

    const seasonsPayload = await seasonsResponse.json();
    leagueName = seasonsPayload?.league?.Name || leagueName;
    leagueCountry = seasonsPayload?.league?.Country || leagueCountry;
    leagueLogoUrl = seasonsPayload?.league?.LogoURL || leagueLogoUrl;
    leagueSeasons = Array.isArray(seasonsPayload?.seasons) ? seasonsPayload.seasons : [];

    const searchSeason = Number(new URLSearchParams(window.location.search).get("season"));
    const currentSeason = leagueSeasons.find((season) => Number(season.Current) === 1);
    const fallbackSeason = currentSeason || leagueSeasons[0];
    const initialSeason = leagueSeasons.find((season) => Number(season.Year) === searchSeason) || fallbackSeason;

    if (!initialSeason) {
      renderHeader();
      renderSeasonSwitcher();
      standingsEl.innerHTML = renderStandingsMessage("No seasons available for this league.");
      recentFixturesEl.innerHTML = `<div class="dashboard-empty-card">No recent fixtures available.</div>`;
      recentPaginationEl.hidden = true;
      recentPaginationEl.innerHTML = "";
      return;
    }

    await selectSeason(Number(initialSeason.Year));
  }

  initialiseLeaguePage().catch((error) => {
    const message = window.KickoffUIErrors.resolveMessage(error, "Unable to load league details.");
    pageError.render(message);
    renderHeader();
    seasonSwitcherEl.innerHTML = '<div class="fixture-empty">Season data unavailable.</div>';
    standingsEl.innerHTML = renderStandingsMessage("Standings unavailable.");
    recentPaginationEl.hidden = true;
    recentPaginationEl.innerHTML = "";
    recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
  });
</script>
{% endblock %}
