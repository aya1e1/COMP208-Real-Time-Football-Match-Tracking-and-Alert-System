{% extends "base.html" %}
{% block title %}Kickoff — League Standings{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/fixture_cards.css') }}">
<style>
  .league-view-page {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .league-view-page .card {
    border-radius: 0;
  }

  .league-page-header {
    padding: 4px 0 2px;
    text-align: center;
  }

  .league-headline {
    margin: 0;
    font-size: clamp(1.55rem, 2vw, 2.2rem);
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  .league-season-switcher {
    padding: 2px 0 2px;
  }

  .league-season-switcher.fixture-h2h-nav {
    display: flex;
    justify-content: flex-start;
    gap: 0;
  }

  .league-season-switcher .fixture-h2h-group,
  .league-season-switcher .fixture-h2h-group.right {
    justify-content: flex-start;
  }

  .league-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
    gap: 22px;
    align-items: start;
  }

  .league-column {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .league-section .card-body {
    padding: 18px 20px;
  }

  .league-fixture-section {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .league-fixture-section .fixture-section-title {
    margin-bottom: 0;
  }

  .league-standings-wrap {
    overflow-x: auto;
  }

  @media (max-width: 980px) {
    .league-layout {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock %}

{% block content %}
<main class="page league-page" data-league-id="{{ league_id }}">
  <div class="match-back">
    <a href="/">&larr; Back to home</a>
  </div>
  <div id="league-error-banner" class="page-error-banner" aria-live="polite"></div>

  <div class="league-view-page">
    <nav id="league-season-switcher" class="fixture-h2h-nav league-season-switcher" aria-label="League seasons">
      <div class="fixture-empty">Loading seasons...</div>
    </nav>

    <header class="league-page-header" id="league-header">
      <h1 class="league-headline">Loading league...</h1>
    </header>

    <section class="league-layout">
      <div class="league-column">
        <section class="card league-section">
          <div class="card-body">
            <h2 class="fixture-section-title">League Table</h2>
            <div id="league-standings" class="fixture-empty">Loading standings...</div>
          </div>
        </section>
      </div>

      <aside class="league-column">
        <section class="league-fixture-section">
          <h2 class="fixture-section-title">Recent Fixtures</h2>
          <div id="league-recent-fixtures" class="dashboard-fixture-stack">
            <div class="dashboard-empty-card">Loading recent fixtures...</div>
          </div>
        </section>
      </aside>
    </section>
  </div>
</main>

<script src="{{ url_for('static', filename='js/ui_errors.js') }}"></script>
<script src="{{ url_for('static', filename='js/fixture_cards.js') }}"></script>
<script src="{{ url_for('static', filename='js/recent_fixtures.js') }}"></script>
<script src="{{ url_for('static', filename='js/overview_tables.js') }}"></script>
<script>
  const page = document.querySelector(".league-page");
  const leagueId = Number(page?.dataset.leagueId);
  const errorBannerEl = document.getElementById("league-error-banner");
  const headerEl = document.getElementById("league-header");
  const seasonSwitcherEl = document.getElementById("league-season-switcher");
  const standingsEl = document.getElementById("league-standings");
  const recentFixturesEl = document.getElementById("league-recent-fixtures");

  let leagueSeasons = [];
  let selectedSeasonYear = null;
  let leagueName = "League";

  function clearPageError() {
    errorBannerEl.innerHTML = "";
  }

  function renderPageError(message) {
    errorBannerEl.innerHTML = window.KickoffUIErrors.render(message);
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function formatDateTime(dateString) {
    if (!dateString) {
      return { date: "TBC", time: "" };
    }

    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) {
      return { date: escapeHtml(dateString), time: "" };
    }

    return {
      date: date.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short"
      }),
      time: date.toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      })
    };
  }

  function renderTeamLogo(url, alt, className) {
    if (!url) {
      return "";
    }

    return `<img src="${escapeHtml(url)}" alt="${escapeHtml(alt)}" class="${className}" loading="lazy">`;
  }

  function renderHeader() {
    headerEl.innerHTML = `
      <h1 class="league-headline">${escapeHtml(leagueName)}</h1>
    `;
  }

  function renderSeasonSwitcher() {
    if (!leagueSeasons.length) {
      seasonSwitcherEl.innerHTML = `<div class="fixture-empty">No seasons available.</div>`;
      return;
    }

    seasonSwitcherEl.innerHTML = `
      <div class="fixture-h2h-group left">
        ${leagueSeasons.map((season) => {
          const year = Number(season.Year);
          if (year === Number(selectedSeasonYear)) {
            return `
              <span class="fixture-h2h-link active" aria-current="page">
                ${escapeHtml(year)}
              </span>
            `;
          }

          return `
            <a class="fixture-h2h-link" href="/leagues/${leagueId}?season=${year}" data-season-year="${year}">
              ${escapeHtml(year)}
            </a>
          `;
        }).join("")}
      </div>
    `;

    seasonSwitcherEl.querySelectorAll("[data-season-year]").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        const year = Number(link.dataset.seasonYear);
        if (!Number.isFinite(year) || year === Number(selectedSeasonYear)) {
          return;
        }

        selectSeason(year);
      });
    });
  }

  function renderStandings(standings) {
    if (!standings.length) {
      standingsEl.innerHTML = `<div class="fixture-empty">No standings available for this season.</div>`;
      return;
    }

    standingsEl.innerHTML = window.KickoffOverviewTables.renderTable({
      className: "overview-table",
      wrapClassName: "league-standings-wrap",
      headers: [
        { content: "Pos" },
        { content: "" },
        { content: "Team" },
        { content: "MP" },
        { content: "GD" },
        { content: "Pts" }
      ],
      rows: standings.map((row) => ([
        { className: "team-value", content: row.Position },
        {
          className: "team-value",
          content: row.TeamLogoURL
            ? `<img src="${escapeHtml(row.TeamLogoURL)}" alt="${escapeHtml(row.TeamName)} logo" width="22" height="22" loading="lazy">`
            : "",
          raw: true
        },
        {
          className: "team-value",
          content: `<a href="/teams/${escapeHtml(row.TeamID)}">${escapeHtml(row.TeamAbbreviation || row.TeamName)}</a>`,
          raw: true
        },
        { className: "team-value", content: row.Played },
        { className: "team-value", content: row.GD },
        { className: "team-value", content: row.Points }
      ]))
    });
  }

  async function loadSeasonData(year) {
    const [standingsResponse, fixturesResponse] = await Promise.all([
      fetch(`/api/leagues/${leagueId}/seasons/${year}`),
      fetch(`/api/leagues/${leagueId}/seasons/${year}/recent-fixtures`)
    ]);

    if (!standingsResponse.ok) {
      throw new Error("Unable to load league standings.");
    }

    if (!fixturesResponse.ok) {
      throw new Error("Unable to load recent fixtures.");
    }

    const standingsPayload = await standingsResponse.json();
    const fixturesPayload = await fixturesResponse.json();

    leagueName = standingsPayload?.league?.Name || fixturesPayload?.league?.Name || leagueName;
    clearPageError();
    renderHeader();
    renderStandings(Array.isArray(standingsPayload?.standings) ? standingsPayload.standings : []);
    window.KickoffRecentFixtures.render(
      recentFixturesEl,
      Array.isArray(fixturesPayload?.recent_fixtures) ? fixturesPayload.recent_fixtures : [],
      { fallbackLeagueName: leagueName }
    );
  }

  async function selectSeason(year) {
    const previousSelectedSeasonYear = selectedSeasonYear;
    const previousStandingsHtml = standingsEl.innerHTML;
    const previousRecentFixturesHtml = recentFixturesEl.innerHTML;
    selectedSeasonYear = year;
    renderHeader();
    renderSeasonSwitcher();
    standingsEl.innerHTML = `<div class="fixture-empty">Loading standings...</div>`;
    recentFixturesEl.innerHTML = `<div class="dashboard-empty-card">Loading recent fixtures...</div>`;

    const url = new URL(window.location.href);
    url.searchParams.set("season", String(year));
    window.history.replaceState({}, "", url);

    try {
      await loadSeasonData(year);
    } catch (error) {
      const message = window.KickoffUIErrors.resolveMessage(error, "Unable to load league details.");
      selectedSeasonYear = previousSelectedSeasonYear;
      renderSeasonSwitcher();
      standingsEl.innerHTML = previousStandingsHtml || '<div class="fixture-empty">Standings unavailable.</div>';
      recentFixturesEl.innerHTML = previousRecentFixturesHtml || '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
      renderPageError(message);
    }
  }

  async function initialiseLeaguePage() {
    if (!Number.isFinite(leagueId)) {
      renderPageError("Unable to load league details.");
      renderHeader();
      seasonSwitcherEl.innerHTML = '<div class="fixture-empty">Season data unavailable.</div>';
      standingsEl.innerHTML = '<div class="fixture-empty">Standings unavailable.</div>';
      recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
      return;
    }

    const seasonsResponse = await fetch(`/api/leagues/${leagueId}/seasons`);
    if (!seasonsResponse.ok) {
      throw new Error(seasonsResponse.status === 404 ? "League not found." : "Unable to load league details.");
    }

    const seasonsPayload = await seasonsResponse.json();
    leagueName = seasonsPayload?.league?.Name || leagueName;
    leagueSeasons = Array.isArray(seasonsPayload?.seasons) ? seasonsPayload.seasons : [];

    const searchSeason = Number(new URLSearchParams(window.location.search).get("season"));
    const currentSeason = leagueSeasons.find((season) => Number(season.Current) === 1);
    const fallbackSeason = currentSeason || leagueSeasons[0];
    const initialSeason = leagueSeasons.find((season) => Number(season.Year) === searchSeason) || fallbackSeason;

    if (!initialSeason) {
      renderHeader();
      renderSeasonSwitcher();
      standingsEl.innerHTML = `<div class="fixture-empty">No seasons available for this league.</div>`;
      recentFixturesEl.innerHTML = `<div class="dashboard-empty-card">No recent fixtures available.</div>`;
      return;
    }

    await selectSeason(Number(initialSeason.Year));
  }

  initialiseLeaguePage().catch((error) => {
    const message = window.KickoffUIErrors.resolveMessage(error, "Unable to load league details.");
    renderPageError(message);
    renderHeader();
    seasonSwitcherEl.innerHTML = '<div class="fixture-empty">Season data unavailable.</div>';
    standingsEl.innerHTML = '<div class="fixture-empty">Standings unavailable.</div>';
    recentFixturesEl.innerHTML = '<div class="dashboard-empty-card">Recent fixtures unavailable.</div>';
  });
</script>
{% endblock %}
