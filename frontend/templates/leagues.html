{% extends "base.html" %}
{% block title %}Kickoff — Leagues{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ static_asset('css/fixture_cards.css') }}">
<link rel="stylesheet" href="{{ static_asset('css/team_league_pages.css') }}">
{% endblock %}

{% block content %}
<main class="page leagues-page">
  <div id="leagues-error-banner" class="page-error-banner" aria-live="polite"></div>

  <header class="leagues-page-header">
    <h1 class="leagues-headline">Leagues</h1>
  </header>

  <nav id="league-country-filter" class="fixture-h2h-nav leagues-country-filter" aria-label="League countries">
    <div class="fixture-empty">Loading countries</div>
  </nav>

  <section>
    <div id="leagues-grid" class="dashboard-team-grid" aria-live="polite">
      <div class="dashboard-empty-card">Loading leagues</div>
    </div>
  </section>
</main>

<script src="{{ static_asset('js/ui_errors.js') }}"></script>
<script src="{{ static_asset('js/fixture_cards.js') }}"></script>
<script>
  const errorBannerEl = document.getElementById("leagues-error-banner");
  const countryFilterEl = document.getElementById("league-country-filter");
  const leaguesGridEl = document.getElementById("leagues-grid");
  const {
    createPageErrorController,
    escapeHtml
  } = window.KickoffFixtureCards;
  const pageError = createPageErrorController(errorBannerEl);
  const COUNTRY_CODE_MAP = {
    Argentina: "ARG",
    Belgium: "BEL",
    Brazil: "BRA",
    England: "ENG",
    France: "FRA",
    Germany: "GER",
    Italy: "ITA",
    Netherlands: "NED",
    Portugal: "POR",
    "Saudi-Arabia": "KSA",
    Scotland: "SCO",
    Spain: "ESP",
    Turkey: "TUR",
    USA: "USA"
  };

  let allLeagues = [];
  let selectedCountryCode = "ALL";

  function renderLeagueLogo(logoUrl, altText) {
    if (!logoUrl) {
      return '<div class="dashboard-team-logo leagues-logo-placeholder" aria-hidden="true"></div>';
    }

    return `<img class="dashboard-team-logo" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(altText)}" loading="lazy">`;
  }

  function getCountryCode(countryName) {
    if (!countryName) {
      return "UNK";
    }

    return COUNTRY_CODE_MAP[countryName] || countryName.replace(/[^A-Za-z]/g, "").slice(0, 3).toUpperCase();
  }

  function getCountryOptions(leagues) {
    const seen = new Set();
    const options = [];

    leagues.forEach((league) => {
      const countryName = league.Country;
      const countryCode = getCountryCode(countryName);
      if (!countryName || seen.has(countryCode)) {
        return;
      }

      seen.add(countryCode);
      options.push({ code: countryCode, name: countryName });
    });

    return options.sort((left, right) => left.name.localeCompare(right.name));
  }

  function renderCountryFilter() {
    const countryOptions = getCountryOptions(allLeagues);

    if (!countryOptions.length) {
      countryFilterEl.innerHTML = '<div class="fixture-empty">No country filters available.</div>';
      return;
    }

    const countryLinks = [{ code: "ALL", name: "All countries" }, ...countryOptions];
    countryFilterEl.innerHTML = `
      <div class="fixture-h2h-group left">
        ${countryLinks.map((country) => {
          if (country.code === selectedCountryCode) {
            return `
              <span
                class="fixture-h2h-link active"
                aria-current="page"
                title="${escapeHtml(country.name)}"
              >
                ${escapeHtml(country.code)}
              </span>
            `;
          }

          return `
            <a
              class="fixture-h2h-link"
              href="${country.code === "ALL" ? "/leagues" : `/leagues?country=${encodeURIComponent(country.code)}`}"
              data-country-code="${escapeHtml(country.code)}"
              title="${escapeHtml(country.name)}"
            >
              ${escapeHtml(country.code)}
            </a>
          `;
        }).join("")}
      </div>
    `;

    countryFilterEl.querySelectorAll("[data-country-code]").forEach((link) => {
      link.addEventListener("click", (event) => {
        event.preventDefault();
        selectCountry(link.dataset.countryCode || "ALL");
      });
    });
  }

  function renderLeagues(leagues) {
    if (!leagues.length) {
      leaguesGridEl.innerHTML = '<div class="dashboard-empty-card">No leagues available.</div>';
      return;
    }

    leaguesGridEl.innerHTML = leagues.map((league) => `
      <a href="/leagues/${Number(league.LeagueID)}" class="card dashboard-team-card">
        <div class="card-body">
          <div class="dashboard-team-card-inner">
            ${renderLeagueLogo(league.LogoURL, `${league.Name} logo`)}
            <h2 class="dashboard-team-name leagues-card-title">${escapeHtml(league.Name || "League")}</h2>
          </div>
        </div>
      </a>
    `).join("");
  }

  function renderFilteredLeagues() {
    const leaguesToRender = selectedCountryCode === "ALL"
      ? allLeagues
      : allLeagues.filter((league) => getCountryCode(league.Country) === selectedCountryCode);

    renderLeagues(leaguesToRender);
  }

  function selectCountry(countryCode) {
    selectedCountryCode = countryCode;
    renderCountryFilter();
    renderFilteredLeagues();

    const url = new URL(window.location.href);
    if (countryCode === "ALL") {
      url.searchParams.delete("country");
    } else {
      url.searchParams.set("country", countryCode);
    }
    window.history.replaceState({}, "", url);
  }

  fetch("/api/leagues")
    .then((response) => {
      if (!response.ok) {
        throw new Error("Unable to load leagues.");
      }

      return response.json();
    })
    .then((leagues) => {
      allLeagues = Array.isArray(leagues) ? leagues : [];
      const availableCountryCodes = new Set(["ALL", ...getCountryOptions(allLeagues).map((country) => country.code)]);
      const searchCountry = (new URLSearchParams(window.location.search).get("country") || "ALL").toUpperCase();
      selectedCountryCode = availableCountryCodes.has(searchCountry) ? searchCountry : "ALL";
      pageError.clear();
      renderCountryFilter();
      renderFilteredLeagues();
    })
    .catch((error) => {
      const message = window.KickoffUIErrors.resolveMessage(error, "Unable to load leagues.");
      pageError.render(message);
      countryFilterEl.innerHTML = '<div class="fixture-empty">Country filters unavailable.</div>';
      leaguesGridEl.innerHTML = '<div class="dashboard-empty-card">League data unavailable.</div>';
    });
</script>
{% endblock %}
