{% extends "base.html" %}
{% block title %}Register | Kickoff{% endblock %}

{% block content %}
<main class="page">
  <section class="auth-shell">
    <div class="auth-panel card">
      <div class="auth-form-wrap">
        <div class="auth-intro">
          <h1>Create your account</h1>

        </div>

        {% if error %}
        <div class="auth-alert" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.register') }}" class="auth-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Choose a username" required minlength="3">

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a password" required>

          <button type="submit" class="auth-submit">Create account</button>
        </form>

        <p class="auth-switch">
          Already have an account?
          <a href="{{ url_for('auth.login_page') }}">Sign in</a>
        </p>
      </div>
    </div>
  </section>
</main>
{% endblock %}
